<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>LPG 표준밀도 환산기 · KS 보간표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f3f1ea;
    --card:#ffffff;
    --ink:#1c2a28;
    --muted:#6d7d79;
    --faint:#9aa8a4;
    --line:#e3e0d6;
    --line-2:#d2cfc3;
    --teal:#0e6b66;
    --teal-deep:#0a4f4b;
    --teal-soft:#e4f0ee;
    --amber:#c2772a;
    --amber-soft:#f6e9d8;
    --red:#c0463f;
    --red-soft:#f6e0de;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--paper);color:var(--ink);
    font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Apple SD Gothic Neo',sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100dvh;display:flex;justify-content:center;padding:22px 16px max(28px,env(safe-area-inset-bottom))}
  .app{width:100%;max-width:460px}

  /* header */
  header{margin-bottom:18px}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);font-weight:500}
  h1{font-size:24px;font-weight:700;letter-spacing:-.02em;margin:5px 0 4px;line-height:1.15}
  .tagline{font-size:13px;color:var(--muted);line-height:1.5}

  /* input card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 16px;box-shadow:0 1px 2px rgba(28,42,40,.04)}
  .field{padding:6px 2px}
  .field + .field{margin-top:6px;border-top:1px solid var(--line)}
  .f-label{display:flex;align-items:baseline;gap:8px;margin-bottom:11px}
  .f-name{font-size:15px;font-weight:600}
  .f-range{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint);margin-left:auto}
  .stepper{display:flex;align-items:stretch;gap:10px}
  .step-btn{flex:none;width:50px;border:1px solid var(--line-2);background:var(--paper);border-radius:12px;
    font-size:26px;font-weight:500;color:var(--teal);cursor:pointer;line-height:1;transition:.12s;font-family:'IBM Plex Mono',monospace}
  .step-btn:active{background:var(--teal);color:#fff;transform:scale(.95)}
  .val-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;
    border:1.5px solid var(--line-2);border-radius:12px;background:#fcfcfa;transition:border-color .15s}
  .val-wrap:focus-within{border-color:var(--teal)}
  .val-input{width:100%;border:none;background:transparent;text-align:center;font-family:'IBM Plex Mono',monospace;
    font-size:27px;font-weight:600;color:var(--ink);padding:13px 6px;outline:none}
  .val-unit{position:absolute;right:13px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--faint);pointer-events:none}

  /* result */
  .result{margin-top:14px;background:var(--teal-deep);border-radius:18px;padding:20px 18px;color:#eafaf8;position:relative;overflow:hidden}
  .result::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%)}
  .r-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#7fd6cf}
  .r-value{font-family:'IBM Plex Mono',monospace;font-size:54px;font-weight:600;line-height:1.05;margin:6px 0 2px;letter-spacing:-.01em}
  .r-value .unit{font-size:18px;font-weight:400;color:#86cfc8;margin-left:8px}
  .r-basis{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#a9ddd8}
  .r-copy{position:absolute;top:16px;right:16px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);
    color:#dff6f3;font-family:'IBM Plex Mono',monospace;font-size:11px;border-radius:8px;padding:6px 10px;cursor:pointer;transition:.12s;z-index:2}
  .r-copy:active{background:rgba(255,255,255,.2)}
  /* error/empty states */
  .result.warn{background:var(--amber-soft);color:#7a4b16}
  .result.warn .r-label{color:var(--amber)}
  .result.warn .r-copy{display:none}
  .result.err{background:var(--red-soft);color:#7c2c27}
  .result.err .r-label{color:var(--red)}
  .result.err .r-copy{display:none}
  .r-msg{font-size:16px;font-weight:600;line-height:1.4;margin-top:6px}

  /* basis details */
  details.basis{margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  details.basis summary{list-style:none;cursor:pointer;padding:13px 16px;font-size:13.5px;font-weight:600;color:var(--teal);
    display:flex;align-items:center;justify-content:space-between}
  details.basis summary::-webkit-details-marker{display:none}
  details.basis summary .chev{transition:transform .2s;font-family:'IBM Plex Mono',monospace}
  details.basis[open] summary .chev{transform:rotate(90deg)}
  .basis-body{padding:0 16px 15px;font-size:12.5px;color:var(--muted)}
  .grid2{display:grid;grid-template-columns:auto auto;gap:6px 14px;font-family:'IBM Plex Mono',monospace;font-size:12px;margin:4px 0 12px}
  .grid2 .k{color:var(--faint)} .grid2 .v{color:var(--ink);text-align:right}
  .corner{border-collapse:collapse;width:100%;font-family:'IBM Plex Mono',monospace;font-size:12px}
  .corner th,.corner td{border:1px solid var(--line);padding:7px 8px;text-align:center}
  .corner th{background:var(--teal-soft);color:var(--teal-deep);font-weight:600}
  .corner td .lbl{display:block;font-size:9.5px;color:var(--faint)}
  .basis-note{margin-top:10px;font-size:11.5px;color:var(--faint);line-height:1.5}

  footer{margin-top:16px;font-size:11.5px;color:var(--faint);line-height:1.6;text-align:center}
  footer b{color:var(--muted);font-weight:600}
  :focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:8px}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="eyebrow">KS 온도–밀도 보간표 · 0–50℃</span>
    <h1>LPG 표준밀도 환산기</h1>
    <p class="tagline">측정 온도와 밀도를 넣으면 KS 표를 양선형 보간해 <b>표준상태 환산밀도</b>를 계산합니다.</p>
  </header>

  <div class="card">
    <div class="field">
      <div class="f-label"><span class="f-name">측정 온도</span><span class="f-range" id="tRange">0 ~ 50 ℃</span></div>
      <div class="stepper">
        <button class="step-btn" data-act="t-" aria-label="온도 감소">−</button>
        <div class="val-wrap">
          <input class="val-input" id="temp" inputmode="decimal" value="25.0" aria-label="측정 온도 (섭씨)">
          <span class="val-unit">℃</span>
        </div>
        <button class="step-btn" data-act="t+" aria-label="온도 증가">+</button>
      </div>
    </div>
    <div class="field">
      <div class="f-label"><span class="f-name">측정 밀도 ρ</span><span class="f-range" id="dRange">0.505 ~ 0.595</span></div>
      <div class="stepper">
        <button class="step-btn" data-act="d-" aria-label="밀도 감소">−</button>
        <div class="val-wrap">
          <input class="val-input" id="dens" inputmode="decimal" value="0.565" aria-label="측정 밀도">
          <span class="val-unit">g/cm³</span>
        </div>
        <button class="step-btn" data-act="d+" aria-label="밀도 증가">+</button>
      </div>
    </div>
  </div>

  <div class="result" id="result">
    <button class="r-copy" id="copyBtn">복사</button>
    <div class="r-label">표준상태 환산밀도</div>
    <div class="r-value" id="rValue">—</div>
    <div class="r-basis" id="rBasis"></div>
    <div class="r-msg" id="rMsg" style="display:none"></div>
  </div>

  <details class="basis">
    <summary>계산 근거 보기 <span class="chev">▸</span></summary>
    <div class="basis-body" id="basisBody">값을 입력하면 보간에 사용된 표 셀이 표시됩니다.</div>
  </details>

  <footer>
    <b>입력 범위</b> 온도 0–50℃ · 밀도 0.505–0.595 &nbsp;|&nbsp; KS 표 양선형 보간 (원본 파이썬과 동일 결과)<br>
    표 가장자리의 빈 구간은 환산값이 없을 수 있습니다 · 참고용
  </footer>
</div>

/* ---- interpolation (mirror of the Python KSTable) ---- */
function findBrackets(arr,x){
  if(x < arr[0]-1e-9 || x > arr[arr.length-1]+1e-9) throw {type:'range',min:arr[0],max:arr[arr.length-1]};
  let lo=0,hi=arr.length-1;
  while(lo<=hi){const mid=(lo+hi)>>1;
    if(Math.abs(arr[mid]-x)<1e-9) return [mid,mid];
    if(arr[mid]<x) lo=mid+1; else hi=mid-1;}
  return [Math.max(0,lo-1),lo];
}
function lerp(x0,x1,y0,y1,x){ if(Math.abs(x1-x0)<1e-12) return y0; return y0+(y1-y0)*(x-x0)/(x1-x0); }
function interpolate(tc,md){
  const T=KS.temps,D=KS.densities,G=KS.grid;
  const [t0,t1]=findBrackets(T,tc), [d0,d1]=findBrackets(D,md);
  const T0=T[t0],T1=T[t1],D0=D[d0],D1=D[d1];
  const Q11=G[t0][d0],Q12=G[t0][d1],Q21=G[t1][d0],Q22=G[t1][d1];
  if([Q11,Q12,Q21,Q22].some(v=>v==null)) throw {type:'empty',T0,T1,D0,D1};
  let R1,R2,val;
  if(Math.abs(T1-T0)<1e-12){ R1=lerp(D0,D1,Q11,Q12,md); R2=R1; val=R1; }
  else { R1=lerp(D0,D1,Q11,Q12,md); R2=lerp(D0,D1,Q21,Q22,md); val=lerp(T0,T1,R1,R2,tc); }
  return {val,T0,T1,D0,D1,Q11,Q12,Q21,Q22,R1,R2};
}

}

      <tr><th>${fmtT(r.T1)}℃</th><td><span class="lbl">Q21</span>${r.Q21.toFixed(3)}</td><td><span class="lbl">Q22</span>${r.Q22.toFixed(3)}</td></tr>
    </table>
    <p class="basis-note">표의 네 모서리값(Q)을 밀도 방향으로 먼저, 그다음 온도 방향으로 선형보간(양선형)합니다. 입력이 표의 격자점과 정확히 같으면 해당 값을 그대로 사용합니다.</p>`;
}

function compute(){
  const tc=parseFloat(tempEl.value), md=parseFloat(densEl.value);
  if(tempEl.value.trim()===''||densEl.value.trim()===''||isNaN(tc)||isNaN(md)){
    showMsg('warn','온도와 밀도를 입력하세요'); basisBody.textContent='값을 입력하면 보간에 사용된 표 셀이 표시됩니다.'; return;
  }
  try{
    const r=interpolate(tc,md); showNumber(r,tc,md);
  }catch(e){
    if(e.type==='range'){
      const which = (tc<KS.temps[0]||tc>KS.temps[KS.temps.length-1]) ? '온도' : '밀도';
      showMsg('warn', `${which} 값이 표 범위를 벗어났습니다 · 온도 0~50℃, 밀도 0.505~0.595`);
    }else if(e.type==='empty'){
      showMsg('err', `이 구간(${fmtT(e.T0)}~${fmtT(e.T1)}℃ · ρ${fmtD(e.D0)}~${fmtD(e.D1)})은 KS 표에 값이 없습니다`);
    }else{ showMsg('err','계산 오류'); }
    basisBody.textContent='해당 구간은 표시할 수 없습니다.';
  }
}

/* steppers */
function clamp(v,a,b){return Math.min(b,Math.max(a,v));}
document.querySelector('.card').addEventListener('click',e=>{
  const b=e.target.closest('.step-btn'); if(!b)return;
  const act=b.dataset.act;
  if(act[0]==='t'){
    let v=parseFloat(tempEl.value); if(isNaN(v))v=25;
    v=clamp(v+(act==='t+'?0.5:-0.5), 0, 50); tempEl.value=fmtT(v);
  }else{
    let v=parseFloat(densEl.value); if(isNaN(v))v=0.565;
    v=clamp(v+(act==='d+'?0.005:-0.005), 0.505, 0.595); densEl.value=fmtD(v);
  }
  compute();
});
tempEl.addEventListener('input',compute);
densEl.addEventListener('input',compute);
tempEl.addEventListener('blur',()=>{ if(tempEl.value.trim()!==''&&!isNaN(parseFloat(tempEl.value))) tempEl.value=fmtT(parseFloat(tempEl.value)); });
densEl.addEventListener('blur',()=>{ if(densEl.value.trim()!==''&&!isNaN(parseFloat(densEl.value))) densEl.value=fmtD(parseFloat(densEl.value)); });

copyBtn.addEventListener('click',async()=>{
  if(lastVal==null)return;
  const txt=`표준밀도 ${lastVal} g/cm³ (${lastInputs})`;
  try{ await navigator.clipboard.writeText(txt); copyBtn.textContent='복사됨 ✓'; setTimeout(()=>copyBtn.textContent='복사',1200);}catch(e){ copyBtn.textContent='복사 실패';}
});

compute();
</script>
</body>
</html>
